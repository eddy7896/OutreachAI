<!DOCTYPE html>
<html>
<head>
  <title>Outreach AI Importer</title>
  <style>
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      padding: 16px;
      margin: 0;
      color: #333;
    }
    h2 {
      margin-top: 0;
      font-size: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .form-group {
      margin-bottom: 12px;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 4px;
      color: #555;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 10px;
      background-color: #2563eb;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }
    button:disabled {
      background-color: #93c5fd;
      cursor: not-allowed;
    }
    .status {
      margin-top: 12px;
      font-size: 13px;
      text-align: center;
      font-weight: bold;
    }
    .success { color: #16a34a; }
    .error { color: #dc2626; }
    hr {
      border: 0;
      border-top: 1px solid #eee;
      margin: 16px 0;
    }
  </style>
</head>
<body>
  <h2>✨ Outreach AI</h2>
  
  <div class="form-group">
    <label>Backend URL</label>
    <input type="text" id="backendUrl" placeholder="http://localhost:3000">
  </div>
  <div class="form-group">
    <label>Extension API Key</label>
    <input type="text" id="apiKey" placeholder="ext_sk_...">
  </div>

  <hr>

  <p style="font-size: 12px; color: #666; text-align: center; margin-bottom: 16px;">
    Navigate to a LinkedIn Profile and click the button below to import them.
  </p>

  <button id="importBtn">Scrape & Import Lead</button>

  <div id="statusMsg" class="status"></div>

  <script src="popup.js"></script>
</body>
</html>
